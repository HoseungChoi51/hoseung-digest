<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Tech Digest</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Daily Tech Digest</h1>
        <p id="statusText">Loading status...</p>
      </div>
      <div class="actions">
        <button id="pollButton" class="secondary" type="button">Poll RSS</button>
        <button id="generateButton" type="button">Generate Today</button>
        <button id="refreshSummariesButton" class="secondary" type="button">Refresh Summaries</button>
        <button id="stopServerButton" class="secondary danger-button" type="button">Stop Server</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <nav class="view-nav" aria-label="Primary views">
          <button id="digestViewButton" class="view-button active" data-mode="digest" type="button">Digest</button>
          <button id="libraryViewButton" class="view-button" data-mode="library" type="button">Library</button>
        </nav>
        <div id="libraryControls" class="filter-block" hidden>
          <label for="libraryScope">Library</label>
          <select id="libraryScope">
            <option value="all">All items</option>
            <option value="saved">Saved</option>
            <option value="hidden">Hidden</option>
            <option value="preferred">Preferred</option>
          </select>
        </div>
        <div class="filter-block">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="search" placeholder="Search local digests">
        </div>
        <div class="filter-block">
          <label for="sourceFilter">Source</label>
          <select id="sourceFilter">
            <option value="">All sources</option>
          </select>
        </div>
        <div class="filter-block">
          <label for="tabFilter">Tab</label>
          <select id="tabFilter">
            <option value="">All tabs</option>
          </select>
        </div>
        <nav class="tab-nav" aria-label="Digest tabs">
          <button class="tab-button active" data-tab="" type="button">All</button>
          <button class="tab-button" data-tab="hw" type="button">HW</button>
          <button class="tab-button" data-tab="reddit" type="button">Reddit</button>
          <button class="tab-button" data-tab="dev" type="button">Dev</button>
          <button class="tab-button" data-tab="ai_agent" type="button">AI / Agent</button>
        </nav>
        <nav id="digestList" class="digest-list" aria-label="Digest dates"></nav>
      </aside>

      <section class="reader">
        <div class="reader-header">
          <div>
            <h2 id="digestTitle">No digest selected</h2>
            <p id="digestMeta"></p>
          </div>
          <button id="toggleRawButton" class="secondary" type="button">Raw Markdown</button>
        </div>
        <div id="emptyState" class="empty-state">
          Generate a digest or select one from the left.
        </div>
        <div id="entries" class="entries"></div>
        <button id="loadMoreButton" class="secondary load-more" type="button" hidden>Load More</button>
        <pre id="rawMarkdown" class="raw-markdown" hidden></pre>
      </section>
    </main>

    <script src="/app.js?v=library-actions-2" type="module"></script>
  </body>
</html>
