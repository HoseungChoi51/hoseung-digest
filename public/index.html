<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reddit Digest</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Reddit Digest</h1>
        <p id="statusText">Loading status...</p>
      </div>
      <div class="actions">
        <a class="button secondary" href="/oauth/reddit/start">Connect Reddit</a>
        <button id="generateButton" type="button">Generate Today</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="filter-block">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="search" placeholder="Search local digests">
        </div>
        <div class="filter-block">
          <label for="subredditFilter">Subreddit</label>
          <select id="subredditFilter">
            <option value="">All subreddits</option>
          </select>
        </div>
        <nav id="digestList" class="digest-list" aria-label="Digest dates"></nav>
      </aside>

      <section class="reader">
        <div class="reader-header">
          <div>
            <h2 id="digestTitle">No digest selected</h2>
            <p id="digestMeta"></p>
          </div>
          <button id="toggleRawButton" class="secondary" type="button">Raw Markdown</button>
        </div>
        <div id="emptyState" class="empty-state">
          Generate a digest or select one from the left.
        </div>
        <div id="entries" class="entries"></div>
        <pre id="rawMarkdown" class="raw-markdown" hidden></pre>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
